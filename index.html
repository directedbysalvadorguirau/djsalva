<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ SALVA Sessions</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- HLS -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    :root{
      --ui-pad: 14px;
      --panel-w: min(420px, 86vw);
    }

    html, body{
      height:100%;
      margin:0;
      background:#000;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      overflow-x:hidden;
      overflow-y:auto;
      scroll-snap-type:y mandatory;
      scroll-behavior:smooth;
      overscroll-behavior-y:contain;
    }

    body{
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    body::-webkit-scrollbar{ display:none; }

    .stage{
      height:100vh;
      height:100svh;
      width:100vw;
      display:grid;
      place-items:center;
      background:#000;
      scroll-snap-align:start;
      scroll-snap-stop:always;
      position:relative;
      overflow:hidden;
    }

    .frame{
      --screen-left: 0%;
      --screen-top: 20%;
      --screen-width: 72%;
      --screen-height: 26.9%;
      --btn-bottom: 18.5%;
      --video-scale: 1.2;

      position:relative;
      height:100vh;
      height:100svh;
      width:calc(100svh * 9 / 16);
      max-width:100vw;
      max-height:100svh;
      aspect-ratio:9/16;
      overflow:hidden;
    }

    .frame-classic{
      --screen-left: 0%;
      --screen-top: 20%;
      --screen-width: 72%;
      --screen-height: 26.9%;
      --btn-bottom: 18.5%;
      --video-scale: 1.2;
    }

    .frame-ibicenca{
      --screen-left: 31%;
      --screen-top: 39.8%;
      --screen-width: 38.2%;
      --screen-height: 12.3%;
      --btn-bottom: 18.5%;
      --video-scale: 1.03;
    }

    .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      pointer-events:none;
      user-select:none;
    }

    .screen{
      position:absolute;
      left:var(--screen-left);
      top:var(--screen-top);
      width:var(--screen-width);
      height:var(--screen-height);
      border-radius:0;
      overflow:hidden;
      background:#fff;
    }

    .screen video{
      width:100%;
      height:100%;
      display:block;
      background:#000;
      object-fit:cover;
      object-position:center;
      transform:scale(var(--video-scale));
      transform-origin:center;
      border-radius:0;
      will-change:transform;
      backface-visibility:hidden;
    }

    .top-actions{
      position:absolute;
      top:var(--ui-pad);
      right:var(--ui-pad);
      display:flex;
      align-items:center;
      gap:10px;
      z-index:50;
    }

    .top-btn,
    .menu-btn{
      width:48px;
      height:48px;
      border:none;
      background:rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius:14px;
      display:grid;
      place-items:center;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    .top-btn:active,
    .menu-btn:active{ transform:scale(0.96); }

    .mini-icon{
      width:24px;
      height:24px;
      fill:#fff;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,0.55));
    }

    .bars{
      width:22px;
      height:18px;
      display:grid;
      align-content:center;
      gap:6px;
    }

    .bars span{
      display:block;
      height:3px;
      background:#fff;
      border-radius:999px;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,0.55));
    }

    .audio-time{
      position:absolute;
      top:var(--ui-pad);
      left:var(--ui-pad);
      color:#fff;
      font-size:48px;
      font-weight:900;
      line-height:1;
      text-shadow:0 8px 18px rgba(0,0,0,0.55);
      user-select:none;
      pointer-events:none;
      z-index:55;
    }

    .play-btn{
      position:absolute;
      left:50%;
      bottom:var(--btn-bottom);
      transform:translateX(-50%);
      width:140px;
      height:140px;
      border:none;
      background:transparent;
      display:grid;
      place-items:center;
      cursor:pointer;
      z-index:20;
      -webkit-tap-highlight-color:transparent;
    }

    .play-btn:active{ transform:translateX(-50%) scale(0.95); }

    .icon{
      width:120px;
      height:120px;
      fill:#fff;
      filter:drop-shadow(0 12px 30px rgba(0,0,0,0.6));
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.55);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
      z-index:60;
    }

    .drawer{
      position:absolute;
      top:0;
      right:0;
      height:100%;
      width:var(--panel-w);
      background:rgba(10,10,10,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transform:translateX(102%);
      transition:transform .22s ease;
      z-index:61;
      display:flex;
      flex-direction:column;
      border-left:1px solid rgba(255,255,255,0.08);
    }

    .drawer header{
      padding:18px 18px 12px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .drawer-title{
      color:#fff;
      font-weight:800;
      letter-spacing:0.2px;
      font-size:18px;
    }

    .close-btn{
      width:40px;
      height:40px;
      border:none;
      background:rgba(255,255,255,0.08);
      border-radius:12px;
      display:grid;
      place-items:center;
      cursor:pointer;
    }

    .close-btn svg{
      width:18px;
      height:18px;
      fill:#fff;
    }

    .tracks{
      padding:6px 10px 16px 10px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior:contain;
    }

    .track{
      width:100%;
      display:flex;
      gap:12px;
      align-items:center;
      padding:10px 10px;
      border-radius:14px;
      border:none;
      background:transparent;
      cursor:pointer;
      text-align:left;
    }

    .track:hover{ background:rgba(255,255,255,0.06); }

    .cover{
      width:46px;
      height:46px;
      border-radius:12px;
      background:#111;
      flex:0 0 auto;
      overflow:hidden;
    }

    .cover img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .meta{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
      flex:1 1 auto;
    }

    .name{
      color:#fff;
      font-weight:700;
      font-size:15px;
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .time{
      color:rgba(255,255,255,0.7);
      font-size:13px;
      font-weight:600;
    }

    .open .overlay{
      opacity:1;
      pointer-events:auto;
    }

    .open .drawer{
      transform:translateX(0);
    }

    .sr{
      position:absolute;
      width:1px;
      height:1px;
      padding:0;
      margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    @media (max-width:600px){
      .play-btn{
        width:110px;
        height:110px;
      }

      .icon{
        width:95px;
        height:95px;
      }

      .audio-time{
        font-size:36px;
      }

      .top-btn,
      .menu-btn{
        width:44px;
        height:44px;
      }

      .frame-ibicenca{
        --screen-left: 30.6%;
        --screen-top: 40.1%;
        --screen-width: 39%;
        --screen-height: 12.2%;
        --video-scale: 1.04;
      }
    }
  </style>
</head>

<body>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(console.log);
      });
    }

    const VIDEO_RATE = 1.25;
    const SHARE_BASE_URL = `${location.origin}${location.pathname}`;
    const sessions = [];

    function timeToSeconds(str){
      const parts = str.split(":").map(part => part.trim());
      if (parts.length === 2) {
        const m = parseInt(parts[0], 10) || 0;
        const s = parseInt(parts[1], 10) || 0;
        return (m * 60) + s;
      }
      if (parts.length === 3) {
        const h = parseInt(parts[0], 10) || 0;
        const m = parseInt(parts[1], 10) || 0;
        const s = parseInt(parts[2], 10) || 0;
        return (h * 3600) + (m * 60) + s;
      }
      return 0;
    }

    function clamp(n, min, max){
      return Math.max(min, Math.min(max, n));
    }

    function formatTime(sec){
      if (!Number.isFinite(sec) || sec < 0) return "0:00";
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = Math.floor(sec % 60);

      if (h > 0) {
        return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function applyFallbackSource(mediaEl, fallbackUrl, resumeTime = 0, shouldResume = false, isVideo = false){
      if (!fallbackUrl) return;

      try{
        mediaEl.pause();
      }catch(e){}

      mediaEl.src = fallbackUrl;
      mediaEl.load();

      mediaEl.addEventListener("loadedmetadata", () => {
        if (!isVideo && Number.isFinite(resumeTime) && resumeTime > 0) {
          try{
            mediaEl.currentTime = resumeTime;
          }catch(e){}
        }

        if (isVideo) {
          mediaEl.loop = true;
          mediaEl.playbackRate = VIDEO_RATE;
        }

        if (shouldResume) {
          mediaEl.play().catch(() => {});
        }
      }, { once:true });
    }

    function setupSingleMediaHls(mediaEl, hlsUrl, fallbackUrl, isVideo){
      const nativeType = "application/vnd.apple.mpegurl";

      if (!hlsUrl) {
        if (fallbackUrl) {
          mediaEl.src = fallbackUrl;
          mediaEl.load();
        }
        return null;
      }

      if (mediaEl.canPlayType(nativeType)) {
        mediaEl.addEventListener("error", () => {
          const resumeTime = isVideo ? 0 : (mediaEl.currentTime || 0);
          const shouldResume = isVideo ? true : !mediaEl.paused;
          applyFallbackSource(mediaEl, fallbackUrl, resumeTime, shouldResume, isVideo);
        }, { once:true });

        mediaEl.src = hlsUrl;
        return null;
      }

      if (window.Hls && Hls.isSupported()) {
        const instance = new Hls({
          maxBufferLength: 30,
          maxMaxBufferLength: 60,
          lowLatencyMode: false
        });

        instance.loadSource(hlsUrl);
        instance.attachMedia(mediaEl);

        instance.on(Hls.Events.ERROR, (_, data) => {
          if (!data || !data.fatal) return;

          const resumeTime = isVideo ? 0 : (mediaEl.currentTime || 0);
          const shouldResume = isVideo ? true : !mediaEl.paused;

          try{
            instance.destroy();
          }catch(e){}

          applyFallbackSource(mediaEl, fallbackUrl, resumeTime, shouldResume, isVideo);
        });

        return instance;
      }

      applyFallbackSource(mediaEl, fallbackUrl, 0, isVideo, isVideo);
      return null;
    }

    function closeOtherDrawers(currentId){
      for (const session of sessions) {
        if (session.id !== currentId) {
          session.app.classList.remove("open");
        }
      }
    }

    function pauseOtherAudios(currentId){
      for (const session of sessions) {
        if (session.id !== currentId) {
          session.aud.pause();
        }
      }
    }

    function createSession(def){
      const session = {
        id: def.id,
        title: def.title,
        app: document.getElementById(def.appId),
        section: document.getElementById(def.sectionId),
        vid: document.getElementById(def.vidId),
        aud: document.getElementById(def.audId),
        btn: document.getElementById(def.btnId),
        iconPlay: document.getElementById(def.iconPlayId),
        iconPause: document.getElementById(def.iconPauseId),
        shareBtn: document.getElementById(def.shareBtnId),
        currentTimeEl: document.getElementById(def.currentTimeId),
        openLibrary: document.getElementById(def.openLibraryId),
        closeLibrary: document.getElementById(def.closeLibraryId),
        overlay: document.getElementById(def.overlayId),
        tracksEl: document.getElementById(def.tracksId),
        coverSrc: def.coverSrc,
        storageKey: def.storageKey,
        videoHlsUrl: def.videoHlsUrl,
        videoFallbackUrl: def.videoFallbackUrl,
        audioHlsUrl: def.audioHlsUrl,
        audioFallbackUrl: def.audioFallbackUrl,
        trackNameEls: [],
        videoStarted: false,
        hlsVideo: null,
        hlsAudio: null,
        tracks: def.tracks.map(track => ({
          t: track.t,
          at: track.at,
          sec: timeToSeconds(track.at),
          unlocked: false
        }))
      };

      session.showPlay = () => {
        session.iconPlay.style.display = "block";
        session.iconPause.style.display = "none";
        session.btn.setAttribute("aria-label", "Reproducir");
      };

      session.showPause = () => {
        session.iconPlay.style.display = "none";
        session.iconPause.style.display = "block";
        session.btn.setAttribute("aria-label", "Pausar");
      };

      session.updateTime = (time = session.aud.currentTime || 0) => {
        session.currentTimeEl.textContent = formatTime(time);
      };

      session.saveUnlockedTracks = () => {
        try{
          const unlockedIndexes = [];
          for (let i = 0; i < session.tracks.length; i++) {
            if (session.tracks[i].unlocked) unlockedIndexes.push(i);
          }
          localStorage.setItem(session.storageKey, JSON.stringify(unlockedIndexes));
        }catch(e){}
      };

      session.loadUnlockedTracks = () => {
        try{
          const raw = localStorage.getItem(session.storageKey);
          if (!raw) return;
          const unlockedIndexes = JSON.parse(raw);
          if (!Array.isArray(unlockedIndexes)) return;

          for (const idx of unlockedIndexes) {
            if (Number.isInteger(idx) && idx >= 0 && idx < session.tracks.length) {
              session.tracks[idx].unlocked = true;
            }
          }
        }catch(e){}
      };

      session.unlockTrack = index => {
        const track = session.tracks[index];
        if (!track || track.unlocked) return false;

        track.unlocked = true;
        const nameEl = session.trackNameEls[index];
        if (nameEl) nameEl.textContent = track.t;
        session.saveUnlockedTracks();
        return true;
      };

      session.closeDrawer = () => {
        session.app.classList.remove("open");
      };

      session.openDrawer = () => {
        closeOtherDrawers(session.id);
        session.app.classList.add("open");
      };

      session.ensureVideoRunning = async () => {
        session.vid.playbackRate = VIDEO_RATE;
        if (session.vid.paused) {
          await session.vid.play();
        }
        session.videoStarted = true;
      };

      session.playAll = async () => {
        pauseOtherAudios(session.id);

        try{
          await Promise.all([
            session.aud.play(),
            session.ensureVideoRunning()
          ]);
          session.showPause();
        }catch(e){
          if (session.aud.paused) session.showPlay();
        }
      };

      session.pauseAll = () => {
        session.aud.pause();
        session.showPlay();
      };

      session.seekTo = (seconds, autoplay = true) => {
        const max = Number.isFinite(session.aud.duration) ? session.aud.duration : Infinity;
        session.aud.currentTime = clamp(seconds, 0, max);

        if (autoplay) {
          session.playAll();
        } else if (session.aud.paused) {
          session.showPlay();
        }

        session.updateTime(session.aud.currentTime);
      };

      session.renderTracks = () => {
        session.tracksEl.innerHTML = "";
        session.trackNameEls.length = 0;

        for (let i = 0; i < session.tracks.length; i++) {
          const track = session.tracks[i];
          const displayName = track.unlocked ? track.t : "¿?";
          const trackBtn = document.createElement("button");
          trackBtn.className = "track";
          trackBtn.type = "button";
          trackBtn.innerHTML = `
            <span class="cover"><img src="${session.coverSrc}" alt=""></span>
            <span class="meta">
              <span class="name">${displayName}</span>
              <span class="time">${track.at}</span>
            </span>
          `;

          const nameEl = trackBtn.querySelector(".name");
          session.trackNameEls.push(nameEl);

          trackBtn.addEventListener("click", () => {
            session.unlockTrack(i);
            session.seekTo(track.sec, true);
            session.closeDrawer();
          });

          session.tracksEl.appendChild(trackBtn);
        }
      };

      session.hlsVideo = setupSingleMediaHls(session.vid, session.videoHlsUrl, session.videoFallbackUrl, true);
      session.hlsAudio = setupSingleMediaHls(session.aud, session.audioHlsUrl, session.audioFallbackUrl, false);

      session.loadUnlockedTracks();
      session.renderTracks();
      session.updateTime(0);
      session.showPlay();

      session.btn.addEventListener("click", () => {
